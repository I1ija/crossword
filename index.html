<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Crossword</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-top">
        <span class="header-date" id="header-date"></span>
        <nav class="header-nav">
          <a href="maker.html" class="nav-link maker-link">✏️ Maker</a>
        </nav>
      </div>
      <div class="header-title-block">
        <div class="header-rule"></div>
        <h1 class="site-title">THE CROSSWORD</h1>
        <div class="header-rule"></div>
        <p class="site-tagline">A Collection of Hand-Crafted Puzzles</p>
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="puzzle-grid-section">
      <div class="section-header">
        <h2 class="section-title">Puzzles</h2>
        <div class="section-rule"></div>
      </div>
      <div class="puzzle-grid" id="puzzle-grid">
        <!-- Puzzles injected here -->
      </div>
      <div class="empty-state" id="empty-state" style="display:none;">
        <p>No puzzles yet. <a href="maker.html">Create your first one →</a></p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Made with care &mdash; <a href="maker.html">Create a puzzle</a></p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="storage.js"></script>
  <script src="index.js"></script>
</body>
</html>
